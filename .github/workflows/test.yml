name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Prepare dotnet
        uses: xt0rted/setup-dotnet@v1.5.0

      - name: Prepare Clojure CLR
        run: |
          dotnet tool install --global Clojure.Main --version 1.12.2
          dotnet tool install --global Clojure.Cljr --version 0.1.0-alpha11

      - name: Install clojure tools
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          lein: 2.12.0

      - name: Cache clojure dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: cljdeps-${{ hashFiles('project.clj') }}
          restore-keys: cljdeps-

      - name: Run clj and cljs tests
        run: lein test-all

      - name: Run cljr tests
        run: cljr -X:test
